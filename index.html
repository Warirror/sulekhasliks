<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sulekha Silks — Finest Kerala Silk</title>

<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Libre+Baskerville&family=Cinzel&family=Crimson+Pro&display=swap" rel="stylesheet">

<style>

:root{
--gold:#c8922a;
--ivory:#fdf8f0;
--ink:#1a0a00;
--shadow:rgba(0,0,0,0.15);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Crimson Pro',serif;
background:var(--ivory);
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:1rem 3rem;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
z-index:999;
}

.logo-img{height:55px;}

.nav-links{
display:flex;
gap:2rem;
list-style:none;
}

.nav-links a{
text-decoration:none;
color:var(--ink);
font-size:.7rem;
letter-spacing:.2em;
}

/* HERO */
.hero{
min-height:100vh;
display:grid;
grid-template-columns:1fr 1fr;
padding-top:90px;
background:linear-gradient(135deg,#fdf8f0,#f5e6c0);
}

.hero-left{
padding:5rem;
animation:fadeUp 1s ease;
}

.hero-left h1{
font-family:'Cinzel',serif;
font-size:4rem;
line-height:1.1;
}

.hero-left p{
margin-top:1rem;
opacity:.7;
line-height:1.7;
}

.hero-right{
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero-logo{
position:absolute;
top:30px;
right:30px;
width:90px;
}

.hero-img{
width:80%;
border-radius:10px;
box-shadow:0 30px 80px var(--shadow);
animation:float 6s ease-in-out infinite;
}

/* FLOAT ANIMATION */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* SHOP */
.sec{padding:6rem 3rem;}

.pgrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2rem;
}

.card{
background:white;
overflow:hidden;
box-shadow:0 15px 40px var(--shadow);
transition:.4s;
}

.card:hover{
transform:translateY(-8px);
}

.card-img{
position:relative;
overflow:hidden;
}

.card-img img{
width:100%;
height:380px;
object-fit:cover;
transition:.5s;
}

.card:hover img{
transform:scale(1.1);
}

.card-over{
position:absolute;
bottom:0;
left:0;right:0;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
padding:1rem;
opacity:0;
transition:.4s;
}

.card:hover .card-over{
opacity:1;
}

.order-btn{
background:var(--gold);
color:white;
border:none;
padding:.8rem;
width:100%;
cursor:pointer;
}

/* GALLERY */
.gallery-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:1rem;
margin-top:2rem;
}

.gallery-grid img{
width:100%;
height:250px;
object-fit:cover;
border-radius:6px;
transition:.4s;
}

.gallery-grid img:hover{
transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){

.hero{grid-template-columns:1fr;}

.hero-left{
padding:2rem;
text-align:center;
}

.hero-img{width:90%;}

.pgrid{grid-template-columns:1fr;}

.gallery-grid{grid-template-columns:1fr 1fr;}

.nav-links{display:none;}

}

</style>

</head>

<body>

<!-- NAV -->

<nav>
<img src="images/sulekha.jpg" class="logo-img">

<ul class="nav-links">
<li><a href="#shop">Collection</a></li>
<li><a href="#gallery">Gallery</a></li>
<li><a href="#contact">Order</a></li>
</ul>
</nav>

<!-- HERO -->

<section class="hero">
<div class="hero-left">
<h1>Draped in<br>Timeless Grace</h1>
<p>Premium Kerala sarees crafted by artisans. Delivered to your door — Pay on delivery.</p>
</div>

<div class="hero-right">
<img src="images/sulekha.jpg" class="hero-logo">
<img src="images/saree1.jpg" class="hero-img">
</div>
</section>

<!-- SHOP -->

<section id="shop" class="sec">

<div class="pgrid">

<div class="card">
<div class="card-img">

</div>
</div>
<h3>Kasavu Saree</h3>
</div>

<div class="card">
<div class="card-img">
<img src="images/saree2.jpg">
<div class="card-over">
<button class="order-btn">Order COD</button>
</div>
</div>
<h3>Kanchipuram Silk</h3>
</div>

<div class="card">
<div class="card-img">
<img src="images/saree3.jpg">
<div class="card-over">
<button class="order-btn">Order COD</button>
</div>
</div>
<h3>Chanderi Silk</h3>
</div>

<div class="card">
<div class="card-img">
<img src="images/saree4.jpg">
<div class="card-over">
<button class="order-btn">Order COD</button>
</div>
</div>
<h3>Emerald Kasavu</h3>
</div>

<div class="card">
<div class="card-img">
<img src="images/saree5.jpg">
<div class="card-over">
<button class="order-btn">Order COD</button>
</div>
</div>
<h3>Bridal Silk</h3>
</div>

<div class="card">
<div class="card-img">
<img src="images/saree6.jpg">
<div class="card-over">
<button class="order-btn">Order COD</button>
</div>
</div>
<h3>Indigo Silk</h3>
</div>

</div>
</section>

<!-- GALLERY -->

<section id="gallery" class="sec">
<h2>Gallery</h2>

<div class="gallery-grid">
<img src="images/g1.jpg">
<img src="images/g2.jpg">
<img src="images/g3.jpg">
<img src="images/g4.jpg">
<img src="images/g5.jpg">
<img src="images/g6.jpg">
</div>
</section>

<!-- CONTACT -->

<section id="contact" class="sec">
<h2>Order Now</h2>

<input placeholder="Name"><br><br> <input placeholder="Phone"><br><br>

<textarea placeholder="Address"></textarea><br><br>

<button class="order-btn">Place Order</button>

</section>

</body>
</html>
